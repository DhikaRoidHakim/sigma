# SIGMA - Nginx config
# Serves the React SPA and reverse-proxies /api → backend service
# Container name "backend" is defined in docker-compose.yaml.

upstream sigma_backend {
    server backend:8001;
    keepalive 32;
}

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Uploads / imports / label bulk exports can be large
    client_max_body_size 25m;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml application/xml+rss text/xml image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # Cache static assets aggressively (hashed by CRA)
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Reverse-proxy API to backend
    location /api/ {
        proxy_pass         http://sigma_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # React Router — always fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Basic security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}
